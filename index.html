<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Listado de dashboards por región</title>

  <style>
    :root{
      --bg:#0b0f19;
      --card:#111827;
      --muted:#9ca3af;
      --text:#e5e7eb;
      --stroke:#1f2937;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:16px
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:
        radial-gradient(1200px 700px at 20% 0%,rgba(99,102,241,.18),transparent 50%),
        radial-gradient(900px 600px at 90% 20%,rgba(16,185,129,.12),transparent 55%),
        var(--bg);
      color:var(--text)
    }
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 50px}
    header{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      align-items:flex-end;
      justify-content:space-between;
      margin-bottom:18px
    }
    h1{margin:0;font-size:22px}
    p{margin:6px 0 0;color:var(--muted);font-size:14px}
    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      background:rgba(17,24,39,.55);
      border:1px solid var(--stroke);
      padding:10px 12px;
      border-radius:var(--radius);
      box-shadow:var(--shadow)
    }
    label{font-size:12px;color:var(--muted)}
    select{
      background:#0f172a;
      color:var(--text);
      border:1px solid var(--stroke);
      border-radius:12px;
      padding:10px 12px;
      min-width:220px
    }
    .count{font-size:12px;color:var(--muted)}
    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:14px;
      margin-top:14px
    }
    .card{
      grid-column:span 12;
      background:rgba(17,24,39,.7);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:.15s
    }
    .card:hover{transform:translateY(-2px);border-color:rgba(99,102,241,.6)}
    @media(min-width:640px){.card{grid-column:span 6}}
    @media(min-width:980px){.card{grid-column:span 4}}
    .thumb{
      position:relative;
      width:100%;
      aspect-ratio:16/10;
      background:#0f172a
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:20px
    }
    .badge{
      position:absolute;
      top:10px;
      left:10px;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.75);
      border:1px solid rgba(31,41,55,.9)
    }
    .content{padding:12px}
    .title{margin:0;font-size:15px}
    .meta{margin-top:6px;font-size:12px;color:var(--muted)}
    a.card-link{color:inherit;text-decoration:none;display:block}
    .empty{
      margin-top:18px;
      padding:18px;
      border:1px dashed rgba(156,163,175,.35);
      border-radius:var(--radius);
      color:var(--muted);
      background:rgba(17,24,39,.35)
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>  prueba Listado de dashboards por región</h1>
        <p>Filtrá por región y accedé a cada dashboard.</p>
      </div>

      <div class="controls">
        <div>
          <label for="region">Región</label><br>
          <select id="region"></select>
        </div>
        <div class="count" id="count"></div>
      </div>
    </header>

    <main>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty" style="display:none;">
        No hay dashboards para esta región.
      </div>
    </main>
  </div>

  <script>
    // ===============================
    // EDITÁ SOLO ESTA SECCIÓN
    // ===============================
    const items = [
      {
        title: "FIN AND PAY",
        region: "Latam Sur",
        img: "https://app.cmseventos.com/evento/finpay/assets/img/logo%202025%20F&P.png",
        url: "https://lookerstudio.google.com/reporting/76f6ec34-9822-4f3f-9cce-2f9aeeca2697/page/p_8dg276hkzd"
      },

      {
        title: "Ejemplo Latam Norte",
        region: "Latam Norte",
        img: "https://images.unsplash.com/photo-1521737604893-d14cc237f11d",
        url: "https://google.com"
      },

      {
        title: "Ejemplo Europa",
        region: "Europa",
        img: "https://images.unsplash.com/photo-1485217988980-11786ced9454",
        url: "https://google.com"
      },

      {
        title: "Ejemplo Brasil",
        region: "Brasil",
        img: "https://images.unsplash.com/photo-1522071820081-009f0129c71c",
        url: "https://google.com"
      }
    ];

    const regionSelect = document.getElementById("region");
    const grid = document.getElementById("grid");
    const count = document.getElementById("count");
    const empty = document.getElementById("empty");

    function uniqueRegions(data){
      const set = new Set(data.map(x => x.region));
      return ["Todas", ...Array.from(set)];
    }

    function renderSelect(){
      regionSelect.innerHTML = uniqueRegions(items)
        .map(r => `<option value="${r}">${r}</option>`)
        .join("");
    }

    function cardTemplate(item){
      return `
        <article class="card">
          <a class="card-link" href="${item.url}" target="_blank" rel="noopener noreferrer">
            <div class="thumb">
              <img src="${item.img}" alt="${item.title}">
              <span class="badge">${item.region}</span>
            </div>
            <div class="content">
              <h3 class="title">${item.title}</h3>
              <div class="meta">Click para abrir</div>
            </div>
          </a>
        </article>
      `;
    }

    function render(){
      const selected = regionSelect.value || "Todas";
      const filtered = selected === "Todas"
        ? items
        : items.filter(i => i.region === selected);

      grid.innerHTML = filtered.map(cardTemplate).join("");
      count.textContent = `${filtered.length} resultado(s)`;
      empty.style.display = filtered.length ? "none" : "block";
    }

    renderSelect();
    render();
    regionSelect.addEventListener("change", render);
  </script>
</body>
</html>
